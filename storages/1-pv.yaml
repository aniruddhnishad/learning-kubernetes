apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv1
  labels:
    vol: pv1

spec:
  capacity:
    storage: 1Gi
  
  accessModes:
    - ReadWriteOnce
  
  hostPath:
    path: /data/app


#WHAT IS hostPath?

#Uses node filesystem directly.

#Example:

#/data/app

#on VPS node.

#GOOD for learning.

#NOT ideal production.