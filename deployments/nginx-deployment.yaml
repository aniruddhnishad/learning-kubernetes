apiVersion: apps/v1
kind: Deployment
metadata: 
    name: app1
    labels:
      app: app1
spec:
  replicas: 5
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
       - image: nginx
         name: nginx
         ports:
         - containerPort: 80


