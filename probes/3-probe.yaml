apiVersion: v1
kind: Pod
metadata: 
  name: nginx-startup
  labels:
    app: nginx-startup

spec:
  containers:
    - image: nginx
      name: nginx
      ports:
        - containerPort: 80
      startupProbe:
        httpGet:
          path: /
          port: 80
        failureThreshold: 30
        periodSeconds: 10