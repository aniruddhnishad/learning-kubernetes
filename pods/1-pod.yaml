apiVersion: v1
kind: Pod
metadata:
  name: busy-pod
  labels:
    pod: busy-pod
  
spec: 
  containers:
    - image: busybox
      name: busybox
      command: ["sleep", "3600"]
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: app1-secret
              key: DB_USER
